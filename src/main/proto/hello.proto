syntax = "proto3";

option java_multiple_files = true;
option java_package = "net.mikelythgoe.springbootonlygrpc.proto";

// The request message containing the user's name.
message HelloRequest {
  string name = 1;
}

// The response message containing the greetings
message HelloReply {
  string message = 1;
}

// The Hello Service definition.
// protoc will generate a class named HelloServiceGrpc,
// and an inner class called HelloServiceImplBase
// (in package 'net.mikelythgoe.springbootonlygrpc.proto')
service HelloService {

  // Sends a greeting
  rpc SayHello(HelloRequest) returns (HelloReply) {}
  rpc StreamHello(HelloRequest) returns (stream HelloReply) {}
}